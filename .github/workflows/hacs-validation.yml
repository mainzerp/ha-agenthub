name: HACS Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "custom_components/**"
      - "hacs.json"
  pull_request:
    branches: [main]
    paths:
      - "custom_components/**"
      - "hacs.json"

permissions:
  contents: read

jobs:
  hacs-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: HACS validation
        uses: hacs/action@22.0.0
        with:
          category: integration
          # GitHub repository description and topics are org-level metadata, not files in this repo.
          # Add them on github.com/.../settings before submitting to hacs/default; then drop this line.
          ignore: topics description
