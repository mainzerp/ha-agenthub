name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  actions: write
  security-events: write

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Push rolling images from main only (not on PRs). Same for manual runs on main.
      PUSH_TO_GHCR: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: GHCR image name (lowercase)
        id: ghcr
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.PUSH_TO_GHCR == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (GHCR)
        id: meta
        if: env.PUSH_TO_GHCR == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ghcr.outputs.image }}
          tags: |
            type=ref,event=branch
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}

      - name: Build and push to GHCR
        if: env.PUSH_TO_GHCR == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./container
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (pulled from GHCR)
        if: env.PUSH_TO_GHCR == 'true'
        run: |
          docker pull ${{ steps.ghcr.outputs.image }}:main
          docker run --rm ${{ steps.ghcr.outputs.image }}:main python -c "from app.main import app; print('OK')"

      - name: Scan image with Trivy
        if: env.PUSH_TO_GHCR == 'true'
        uses: aquasecurity/trivy-action@0.29.0
        continue-on-error: true
        with:
          image-ref: ${{ steps.ghcr.outputs.image }}:main
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: env.PUSH_TO_GHCR == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Build (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./container
          push: false
          load: true
          tags: agent-assist:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        if: github.event_name == 'pull_request'
        run: docker run --rm agent-assist:ci python -c "from app.main import app; print('OK')"

      - name: Scan PR image with Trivy
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@0.29.0
        continue-on-error: true
        with:
          image-ref: agent-assist:ci
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF (PR)
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
