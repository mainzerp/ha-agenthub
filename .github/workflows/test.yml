name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # Full suite + coverage is usually well under 10m; allow headroom for cold cache / queue.
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: container/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r container/requirements-dev.txt

      - name: Run tests
        run: cd container && python -m pytest tests/ -n auto -q --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: container/coverage.xml
          retention-days: 14

  test-ha:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pytest
        run: pip install pytest

      - name: Run HA smoke tests
        run: python -m pytest custom_components/tests/ -v --tb=short

  # Baseline security scan: catches known CVEs and common injection patterns.
  # Marked continue-on-error so findings are visible without blocking CI
  # while the project remediates existing issues.
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          pip install bandit pip-audit

      - name: Run Bandit
        run: bandit -r container/app -f json -o bandit-report.json || true

      - name: Run pip-audit
        run: |
          pip-audit -r container/requirements.txt --format=json --output=pip-audit-report.json || true
          pip-audit -r container/requirements-dev.txt --format=json --output=pip-audit-dev-report.json || true

      - name: Upload security scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: |
            bandit-report.json
            pip-audit-report.json
            pip-audit-dev-report.json
          retention-days: 14
