name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: container/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r container/requirements-dev.txt

      - name: Run quality checks
        run: python scripts/ci.py --skip-security --skip-docker

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: container/coverage.xml
          retention-days: 14

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run security checks
        run: python scripts/ci.py --skip-quality --skip-docker

      - name: Upload security scan artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-scan-reports
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 14

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality, security]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write
      security-events: write

    concurrency:
      group: docker-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: GHCR image name (lowercase)
        id: ghcr
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (GHCR)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.ghcr.outputs.image }}
          tags: |
            type=ref,event=branch
            type=sha,format=short,prefix=sha-

      - name: Build and push to GHCR
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./container
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (GHCR)
        run: docker run --rm ${{ steps.ghcr.outputs.image }}@${{ steps.build.outputs.digest }} python -c "from app.main import app; print('OK')"

      - name: Scan image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: os,library
          limit-severities-for-sarif: true

      - name: Scan image with Trivy (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: os,library

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      packages: write
      actions: write
      security-events: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: GHCR image name (lowercase)
        id: ghcr
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Tag release image (no rebuild)
        id: retag
        run: |
          docker buildx imagetools create \
            -t ${{ steps.ghcr.outputs.image }}:${{ steps.version.outputs.VERSION }} \
            -t ${{ steps.ghcr.outputs.image }}:latest \
            "${{ steps.ghcr.outputs.image }}@${{ needs.docker.outputs.digest }}"
          DIGEST=$(docker buildx imagetools inspect \
            "${{ steps.ghcr.outputs.image }}:${{ steps.version.outputs.VERSION }}" \
            --format "{{.Manifest.Digest}}")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.ghcr.outputs.image }}
          subject-digest: ${{ steps.retag.outputs.digest }}
          push-to-registry: true

      - name: Scan image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.ghcr.outputs.image }}:${{ steps.version.outputs.VERSION }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: os,library
          limit-severities-for-sarif: true

      - name: Scan image with Trivy (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.ghcr.outputs.image }}:${{ steps.version.outputs.VERSION }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: os,library

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
