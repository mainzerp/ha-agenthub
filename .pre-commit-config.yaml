default_language_version:
  python: python3.12

default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
        files: ^container/
      - id: ruff-format
        files: ^container/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-r", "container/app", "container/tests", "custom_components", "-ll"]
        files: ^(container/|custom_components/)
        pass_filenames: false

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        language: system
        entry: pip-audit
        args: ["-r", "container/requirements.txt", "--ignore-vuln", "CVE-2026-28684"]
        files: ^container/requirements.*\.txt$
        pass_filenames: false

      - id: pytest-container
        name: pytest (container)
        language: system
        entry: bash
        args: ["-c", "cd container && python -m pytest tests/ -q --tb=short -x"]
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-ha
        name: pytest (HA)
        language: system
        entry: python
        args: ["-m", "pytest", "custom_components/tests/", "-q", "--tb=short", "-x"]
        pass_filenames: false
        stages: [pre-push]
