default_language_version:
  python: python3

default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(container/|custom_components/)
      - id: ruff-format
        files: ^(container/|custom_components/)

  - repo: local
    hooks:
      - id: bandit
        name: bandit
        language: system
        entry: bandit
        args:
          - "-r"
          - "container/app"
          - "-s"
          - "B101,B104,B105,B311,B608"
        files: ^(container/|custom_components/)
        pass_filenames: false

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        language: system
        entry: python
        args: ["-m", "pip_audit", "-r", "container/requirements.txt", "--ignore-vuln", "CVE-2026-28684"]
        files: ^container/requirements.*\.txt$
        pass_filenames: false

      - id: pytest-container
        name: pytest (container)
        language: system
        entry: python
        args: ["-m", "pytest", "container/tests/", "-q", "--tb=short", "-x", "-m", "not integration and not real_scenarios", "-n", "auto", "--rootdir=container"]
        files: ^container/
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-ha
        name: pytest (HA)
        language: system
        entry: python
        args: ["-m", "pytest", "custom_components/tests/", "-q", "--tb=short", "-x", "-m", "not integration", "-n", "auto"]
        files: ^custom_components/
        pass_filenames: false
        stages: [pre-push]
