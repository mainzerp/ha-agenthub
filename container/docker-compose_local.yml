services:
  ha-agenthub:
    # Local image name (not the old compose default "container-agent-assist").
    # Override tag: IMAGE_TAG=0.18.0 docker compose build
    image: ha-agenthub:${IMAGE_TAG:-latest}
    build: .
    container_name: ha-agenthub
    restart: unless-stopped
    ports:
      - "${CONTAINER_PORT:-8080}:8080"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/tmp:noexec,nosuid,size=50m
    volumes:
      - agent-assist-data:/data #legacy volume name of local deployment, cant be changed without breaking existing data
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
        reservations:
          memory: 1G
    environment:
      - CONTAINER_HOST=${CONTAINER_HOST:-0.0.0.0}
      - CONTAINER_PORT=${CONTAINER_PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CHROMADB_PERSIST_DIR=${CHROMADB_PERSIST_DIR:-/data/chromadb}
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-/data/agent_assist.db}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      # When serving behind HTTPS, set COOKIE_SECURE=true so admin session
      # and CSRF cookies are restricted to TLS. See docs/configuration.md.
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

volumes:
  agent-assist-data: #legacy volume name of local deployment, cant be changed without breaking existing data
    driver: local
