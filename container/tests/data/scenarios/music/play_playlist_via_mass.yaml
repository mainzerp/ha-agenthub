id: music.play_playlist_via_mass
agent: music-agent
description: Play a playlist on the MASS player
snapshot: home_default
language: en
context: {source: ha, area_id: living_room, device_id: satellite_living_room}
llm:
  classify: |
    music-agent (95%): Play Morning Vibes playlist on MASS
  agents:
    music-agent: |
      Playing the Morning Vibes playlist.
      ```json
      {"action": "play_media", "entity": "MASS Living Room", "parameters": {"media_id": "Morning Vibes", "media_type": "playlist"}}
      ```
request:
  text: "play my morning vibes playlist"
expected:
  routed_agent: music-agent
  service_calls:
    - domain: music_assistant
      service: play_media
      target_entity: media_player.mass_living_room
      service_data: {media_id: "Morning Vibes", media_type: playlist}
  speech_contains: ["mass"]
