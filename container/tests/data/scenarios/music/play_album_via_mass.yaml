id: music.play_album_via_mass
agent: music-agent
description: Play an album on the MASS player
snapshot: home_default
language: en
context: {source: ha, area_id: living_room, device_id: satellite_living_room}
llm:
  classify: |
    music-agent (95%): Play Abbey Road album on MASS
  agents:
    music-agent: |
      Playing Abbey Road.
      ```json
      {"action": "play_media", "entity": "MASS Living Room", "parameters": {"media_id": "Abbey Road", "media_type": "album"}}
      ```
request:
  text: "play the album abbey road"
expected:
  routed_agent: music-agent
  service_calls:
    - domain: music_assistant
      service: play_media
      target_entity: media_player.mass_living_room
      service_data: {media_id: "Abbey Road", media_type: album}
  speech_contains: ["mass"]
