id: automation.create_kitchen_sunset
agent: automation-agent
description: Create a new automation via voice
snapshot: home_default
language: en
context: {source: ha, area_id: kitchen, device_id: satellite_kitchen}
llm:
  classify: |
    automation-agent (95%): Create an automation that turns on the kitchen light at sunset
  agents:
    automation-agent: |
      Creating the kitchen sunset automation.
      ```json
      {"action": "create_automation", "entity": "kitchen sunset light", "parameters": {"config": {"alias": "Kitchen Sunset Light", "triggers": [{"platform": "sun", "event": "sunset"}], "actions": [{"service": "light.turn_on", "target": {"entity_id": "light.kitchen"}}]}}}
      ```
request:
  text: "create an automation that turns on the kitchen light at sunset"
expected:
  routed_agent: automation-agent
  service_calls: []
  speech_contains: ["created", "Kitchen Sunset Light"]
