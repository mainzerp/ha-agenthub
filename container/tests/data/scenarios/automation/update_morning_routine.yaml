id: automation.update_morning_routine
agent: automation-agent
description: Update an existing automation
snapshot: home_default
language: en
context: {source: ha, area_id: bedroom, device_id: satellite_bedroom}
preconditions:
  entity_overrides:
    - {entity_id: automation.morning_routine, state: "on", attributes: {id: "morning_routine_001", friendly_name: "Morning Routine"}}
llm:
  classify: |
    automation-agent (95%): Update the morning routine automation
  agents:
    automation-agent: |
      Updating the morning routine.
      ```json
      {"action": "update_automation", "entity": "morning routine", "parameters": {"config": {"alias": "Morning Routine", "triggers": [{"platform": "time", "at": "07:00:00"}], "actions": [{"service": "light.turn_on", "target": {"entity_id": "light.bedroom"}}]}}}
      ```
request:
  text: "update the morning routine to turn on the bedroom light at 7 AM"
expected:
  routed_agent: automation-agent
  service_calls: []
  speech_contains: ["updated", "Morning Routine"]
