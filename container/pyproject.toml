[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
timeout = 60
timeout_func_only = true
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
    "real_scenarios: marks YAML-driven real-pipeline end-to-end scenarios (deselect with '-m \"not real_scenarios\"')",
]
filterwarnings = [
    "error::DeprecationWarning:app.*",
    "error::PendingDeprecationWarning:app.*",
    "ignore::DeprecationWarning:aiosqlite.*",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]

[tool.pytest-cov]
source = ["app"]
omit = [
    "app/dashboard/static/*",
    "app/mcp/client_legacy.py",
    "app/mcp/servers/duckduckgo_server.py",
    "tests/*",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/dashboard/static/*",
    "app/mcp/client_legacy.py",
    "app/mcp/servers/duckduckgo_server.py",
    "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ ==",
]

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["app", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "T20", # flake8-print
    "RUF", # Ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function call in argument defaults (FastAPI Depends)
]

[tool.ruff.lint.per-file-ignores]
# Must set test data env vars before any ``app`` imports.
"tests/conftest.py" = ["E402"]
# Must mock litellm before any ``app`` imports.
"tests/test_action_cache_replay.py" = ["E402"]
"tests/test_cache_lookup_order.py" = ["E402"]
"tests/test_routing_cache_skip.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
