# HA-AgentHub container stack (default compose).
# Legacy stack (service agent-assist, volume agent-assist-data): docker-compose_local.yml
#
# Pre-built image (CI pushes from main): ghcr.io/mainzerp/ha-agenthub:main (and :latest).
# Build:   docker compose build
# Run:     docker compose up -d
# Tag:     IMAGE_TAG=0.18.14 docker compose build
#
# Daten von altem Volume übernehmen: Backup aus agent-assist-data, in ha-agenthub-data
# einspielen, oder temporär unter volumes einen external/named volume eintragen.

services:
  ha-agenthub:
    # Use :main or :latest (both set on push to main). :latest alone used to 404 before CI tagged it.
    image: ghcr.io/mainzerp/ha-agenthub:${HA_AGENTHUB_TAG:-main}
    container_name: ha-agenthub
    restart: unless-stopped
    ports:
      - "${CONTAINER_PORT:-8080}:${CONTAINER_PORT:-8080}"
    volumes:
      - ha-agenthub-data:/data
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 1G
    environment:
      - CONTAINER_HOST=${CONTAINER_HOST:-0.0.0.0}
      - CONTAINER_PORT=${CONTAINER_PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CHROMADB_PERSIST_DIR=${CHROMADB_PERSIST_DIR:-/data/chromadb}
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-/data/agent_assist.db}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - COOKIE_SECURE=false # For local development without HTTPS. In production, set to true and ensure HTTPS is used.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:'+os.environ.get('CONTAINER_PORT','8080')+'/api/health')\"",
        ]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

volumes:
  ha-agenthub-data:
    driver: local
