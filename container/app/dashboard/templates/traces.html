{% extends "dashboard_base.html" %}
{% block page_title %}Traces{% endblock %}
{% block page_css %}<link rel="stylesheet" href="{{ static_url(request, '/dashboard/static/css/pages/traces.css') }}">{% endblock %}
{% block header_title %}Request Traces{% endblock %}
{% block page_content %}
<div x-data="tracesListPage()" x-init="init()">

    <!-- Search & Filter Bar -->
    <div class="card mb-md p-md">
        <div class="form-row items-end">
            <!-- Search -->
            <div class="form-group mb-0 flex-1 min-w-200">
                <label class="form-label">Search</label>
                <input type="text" class="form-input" placeholder="Search user input..."
                       x-model="search"
                       @keyup.enter="page=1; loadTraces()"
                       @input.debounce.500ms="page=1; loadTraces()">
            </div>

            <!-- Agent filter -->
            <div class="form-group mb-0">
                <label class="form-label">Agent</label>
                <select class="form-input w-auto min-w-150"
                        x-model="agentFilter" @change="page=1; loadTraces()">
                    <option value="">All Agents</option>
                    <template x-for="a in allAgents" :key="a">
                        <option :value="a" x-text="a"></option>
                    </template>
                </select>
            </div>

            <!-- Label filter -->
            <div class="form-group mb-0">
                <label class="form-label">Label</label>
                <select class="form-input w-auto min-w-120"
                        x-model="labelFilter" @change="page=1; loadTraces()">
                    <option value="">All Labels</option>
                    <template x-for="l in allLabels" :key="l">
                        <option :value="l" x-text="l"></option>
                    </template>
                </select>
            </div>

            <!-- Date From -->
            <div class="form-group mb-0">
                <label class="form-label">From</label>
                <input type="date" class="form-input w-auto"
                       x-model="dateFrom" @change="page=1; loadTraces()">
            </div>

            <!-- Date To -->
            <div class="form-group mb-0">
                <label class="form-label">To</label>
                <input type="date" class="form-input w-auto"
                       x-model="dateTo" @change="page=1; loadTraces()">
            </div>

            <!-- Export -->
            <button class="btn btn-sm btn-secondary self-end" @click="exportCSV()">Export CSV</button>
        </div>
    </div>

    <!-- Traces Table -->
    <div class="card mb-lg">
        <div class="flex-between mb-md">
            <span class="text-muted text-sm" x-text="'Total: ' + total + ' traces'"></span>
            <div class="flex-center">
                <button class="btn btn-sm btn-secondary" :disabled="page <= 1" @click="page--; loadTraces()">Prev</button>
                <span class="text-mono text-sm" x-text="page + ' / ' + pages"></span>
                <button class="btn btn-sm btn-secondary" :disabled="page >= pages" @click="page++; loadTraces()">Next</button>
            </div>
        </div>

        <template x-if="loading">
            <p class="text-muted">Loading traces...</p>
        </template>

        <div class="table-container-flush" x-show="!loading && traces.length > 0">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>User Input</th>
                        <th>Agents</th>
                        <th>Duration</th>
                        <th>Label</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="t in traces" :key="t.trace_id">
                        <tr class="row-clickable" :data-fresh="t._fresh || false">
                            <td class="text-mono text-xs text-nowrap"
                                x-text="formatTimestamp(t.created_at)"></td>
                            <td class="truncate max-w-300"
                                x-text="t.user_input || '-'"></td>
                            <td>
                                <div class="flex flex-wrap gap-xs">
                                    <template x-for="agent in (t.agents || [])" :key="agent">
                                        <span class="badge agent-badge" :class="'agent-' + agentClass(agent)"
                                              x-text="agent"></span>
                                    </template>
                                </div>
                            </td>
                            <td class="text-mono" x-text="t.total_duration_ms ? Math.round(t.total_duration_ms) + 'ms' : '-'"></td>
                            <td>
                                <div class="flex flex-wrap gap-xs">
                                    <span x-show="t.label" class="badge badge-blue text-2xs"
                                          x-text="t.label"></span>
                                    <span x-show="t.voice_followup"
                                          class="badge badge-teal text-2xs"
                                          title="AgentHub kept the microphone open for a follow-up">
                                        FOLLOW-UP
                                    </span>
                                </div>
                            </td>
                            <td>
                                <a class="btn btn-sm btn-primary" :href="dashUrl('/dashboard/traces/' + t.trace_id)">View</a>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <template x-if="!loading && traces.length === 0">
            <div class="empty-state">
                <p>No traces found.</p>
            </div>
        </template>
    </div>
</div>

<script>
function tracesListPage() {
    return {
        traces: [],
        loading: false,
        page: 1,
        pages: 1,
        total: 0,
        search: '',
        agentFilter: '',
        labelFilter: '',
        dateFrom: '',
        dateTo: '',
        allLabels: [],
        allAgents: [],

        async init() {
            await this.loadTraces();
        },

        agentClass(id) {
            if (!id) return 'muted';
            var classes = window._agentColorClasses;
            if (classes && classes[id]) return classes[id];
            var palette = window._agentColorPalette || ['purple', 'yellow', 'blue', 'green', 'red', 'pink', 'indigo', 'teal', 'orange'];
            var hash = 0;
            for (var i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) | 0;
            return palette[Math.abs(hash) % palette.length];
        },

        formatTimestamp(ts) {
            if (!ts) return '-';
            try {
                var clean = ts.trim();
                // SQLite datetime('now') returns "YYYY-MM-DD HH:MM:SS" without timezone.
                // If no timezone indicator is present, treat it as UTC.
                if (!clean.match(/[Zz]|[+-]\d{2}:\d{2}$/)) {
                    clean = clean.replace(' ', 'T') + 'Z';
                }
                const d = new Date(clean);
                return d.toLocaleString();
            } catch { return ts; }
        },

        async loadTraces() {
            this.loading = true;
            try {
                const params = new URLSearchParams({ page: this.page, per_page: 50 });
                if (this.search) params.set('search', this.search);
                if (this.agentFilter) params.set('agent', this.agentFilter);
                if (this.labelFilter) params.set('label', this.labelFilter);
                if (this.dateFrom) params.set('from', this.dateFrom);
                if (this.dateTo) params.set('to', this.dateTo);

                const data = await window.dashboardApi.json('/api/admin/traces?' + params.toString());
                this.traces = data.traces || [];
                this.total = data.total || 0;
                this.pages = data.pages || 1;
                this.allLabels = data.labels || [];
                this.allAgents = data.agents || [];
            } catch (e) {
                if (e.code === 'auth_expired') return;
                console.error('Failed to load traces', e);
            }
            this.loading = false;
        },

        exportCSV() {
            const params = new URLSearchParams();
            if (this.search) params.set('search', this.search);
            if (this.agentFilter) params.set('agent', this.agentFilter);
            if (this.labelFilter) params.set('label', this.labelFilter);
            if (this.dateFrom) params.set('from', this.dateFrom);
            if (this.dateTo) params.set('to', this.dateTo);
            window.open(window.dashUrl('/api/admin/traces/export?' + params.toString()), '_blank');
        }
    };
}
</script>
{% endblock %}
