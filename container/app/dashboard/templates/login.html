{% extends "base.html" %}
{% block content %}
<div class="login-container">
    <div class="login-brand">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="var(--teal)" stroke-width="1.5">
            <path d="M12 2a7 7 0 017 7c0 3-2 5.5-4 7l-1.5 1.5a2.12 2.12 0 01-3 0L9 16c-2-1.5-4-4-4-7a7 7 0 017-7z"/>
            <circle cx="12" cy="9" r="2"/>
            <path d="M8 21h8"/>
        </svg>
    </div>
    <h1>Login</h1>
    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ root_url(request, '/dashboard/login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">Sign In</button>
    </form>
</div>
{% endblock %}
