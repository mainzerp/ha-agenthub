{% extends "dashboard_base.html" %}
{% block page_title %}System Health{% endblock %}
{% block nav_system_health %}active{% endblock %}
{% block header_title %}System Health{% endblock %}
{% block page_content %}
<div x-data="healthPage()" x-init="loadHealth()">

    <div class="page-header">
        <div class="page-header-text">
            <p class="page-subtitle">Subsystem status overview. Auto-refreshes every 15s.</p>
        </div>
    </div>

    <div class="stat-grid-3" id="health-cards">
        <template x-if="!health">
            <div class="stat-card">
                <div class="flex-center" style="gap: 0.5rem; margin-bottom: 0.5rem;">
                    <span class="badge badge-dot" style="--dot-color: var(--soft-amber);"></span>
                    <strong>Loading...</strong>
                </div>
                <p class="text-muted" style="font-size: 0.875rem;">Checking subsystem status...</p>
            </div>
        </template>
        <template x-if="health">
            <template x-for="c in components" :key="c.key">
                <div class="stat-card">
                    <div class="flex-between" style="margin-bottom: 0.5rem;">
                        <div class="flex-center" style="gap: 0.5rem;">
                            <span class="badge badge-dot" :style="'--dot-color: ' + getDotColor(health[c.key])"></span>
                            <strong x-text="c.label"></strong>
                        </div>
                        <span class="badge" :class="getBadgeClass(health[c.key])" x-text="(health[c.key] || {status:'unknown'}).status"></span>
                    </div>
                    <p class="stat-card-detail" x-text="getDetail(c.key, health[c.key])"></p>
                </div>
            </template>
        </template>
    </div>

    <div x-show="error" class="alert alert-error mt-md" x-text="error"></div>
</div>

<script>
function healthPage() {
    return {
        health: null,
        error: '',
        refreshInterval: null,
        components: [
            { key: "ha_connection", label: "Home Assistant" },
            { key: "entity_index", label: "Entity Index" },
            { key: "cache", label: "Cache System" },
            { key: "mcp_servers", label: "MCP Servers" },
            { key: "uptime", label: "Container Uptime" }
        ],
        async loadHealth() {
            var self = this;
            async function doFetch() {
                try {
                    self.health = await window.dashboardApi.json('/api/admin/health/extended');
                    self.error = '';
                } catch(e) {
                    if (e.code === 'auth_expired') {
                        return;
                    }
                    self.error = 'Failed to load health data';
                    console.error("Failed to parse health data", e);
                }
            }
            await doFetch();
            if (!this.refreshInterval) {
                this.refreshInterval = setInterval(doFetch, 15000);
            }
        },
        destroy() {
            if (this.refreshInterval) {
                clearInterval(this.refreshInterval);
                this.refreshInterval = null;
            }
        },
        getStatusClass(comp) {
            if (!comp) return "status-unknown";
            return comp.status === "healthy" ? "status-healthy" : (comp.status === "error" ? "status-error" : "status-unknown");
        },
        getDotColor(comp) {
            if (!comp) return "var(--soft-amber)";
            return comp.status === "healthy" ? "var(--sage)" : (comp.status === "error" ? "var(--coral)" : "var(--soft-amber)");
        },
        getBadgeClass(comp) {
            if (!comp) return "badge-yellow";
            return comp.status === "healthy" ? "badge-green" : (comp.status === "error" ? "badge-red" : "badge-yellow");
        },
        getDetail(key, comp) {
            if (!comp) return "";
            if (key === "uptime" && comp.display) return comp.display;
            if (key === "entity_index" && comp.count !== undefined) return comp.count + " entities indexed";
            if (key === "mcp_servers" && comp.count !== undefined) return comp.count + " server(s) connected";
            if (comp.detail) return comp.detail;
            if (comp.status === "healthy") return "Operating normally";
            return "";
        }
    };
}
</script>
{% endblock %}
