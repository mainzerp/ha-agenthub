{% extends "dashboard_base.html" %}
{% block page_title %}System Health{% endblock %}
{% block page_css %}<link rel="stylesheet" href="{{ static_url(request, '/dashboard/static/css/pages/system_health.css') }}">{% endblock %}
{% block header_title %}System Health{% endblock %}
{% block page_content %}
<div x-data="healthPage()" x-init="loadHealth()">

    <div class="page-header">
        <div class="page-header-text">
            <p class="page-subtitle">Subsystem status overview. Auto-refreshes every 15s.</p>
        </div>
    </div>

    <div class="stat-grid-3" id="health-cards">
        <template x-if="!health">
            <div class="stat-card">
                <div class="flex-center gap-sm mb-sm">
                    <span class="badge badge-dot dot-amber"></span>
                    <strong>Loading...</strong>
                </div>
                <p class="text-muted text-sm">Checking subsystem status...</p>
            </div>
        </template>
        <template x-if="health">
            <template x-for="c in components" :key="c.key">
                <div class="stat-card">
                    <div class="flex-between mb-sm">
                        <div class="flex-center gap-sm">
                            <span class="badge badge-dot" :class="'badge-dot--' + getDotClass(health[c.key])"></span>
                            <strong x-text="c.label"></strong>
                        </div>
                        <span class="badge" :class="dashBadgeClass(health[c.key])" x-text="(health[c.key] || {status:'unknown'}).status"></span>
                    </div>
                    <p class="stat-card-detail" x-text="getDetail(c.key, health[c.key])"></p>
                </div>
            </template>
        </template>
    </div>

    <div x-show="error" class="alert alert-error mt-md" x-text="error"></div>
</div>

<script>
function healthPage() {
    return {
        health: null,
        error: '',
        refreshInterval: null,
        components: [
            { key: "ha_connection", label: "Home Assistant" },
            { key: "entity_index", label: "Entity Index" },
            { key: "cache", label: "Cache System" },
            { key: "mcp_servers", label: "MCP Servers" },
            { key: "task_queue", label: "Task Queue" },
            { key: "uptime", label: "Container Uptime" }
        ],
        async loadHealth() {
            var self = this;
            async function doFetch() {
                var newHealth = await window.dashboardApi.safeJson('/api/admin/health/extended');
                if (newHealth && JSON.stringify(newHealth) !== JSON.stringify(self.health)) {
                    self.health = newHealth;
                    self.error = '';
                }
            }
            await doFetch();
            if (!this.refreshInterval) {
                this.refreshInterval = setInterval(doFetch, 15000);
            }
        },
        destroy() {
            if (this.refreshInterval) {
                clearInterval(this.refreshInterval);
                this.refreshInterval = null;
            }
        },
        getDotClass(comp) {
            if (!comp) return "muted";
            return comp.status === "healthy" ? "green" : (comp.status === "error" ? "red" : "yellow");
        },
        getBadgeClass(comp) { return dashBadgeClass(comp); },
        getDetail(key, comp) {
            if (!comp) return "";
            if (key === "uptime" && comp.display) return comp.display;
            if (key === "entity_index" && comp.count !== undefined) return comp.count + " entities indexed";
            if (key === "mcp_servers" && comp.count !== undefined) return comp.count + " server(s) connected";
            if (key === "task_queue" && comp.pending_count !== undefined) return comp.pending_count + " pending";
            if (comp.detail) return comp.detail;
            if (comp.status === "healthy") return "Operating normally";
            return "";
        }
    };
}
</script>
{% endblock %}
