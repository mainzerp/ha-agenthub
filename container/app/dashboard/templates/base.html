<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("HA-AgentHub") }}</title>
    <link rel="icon" type="image/svg+xml" href="{{ root_url(request, '/dashboard/static/favicon.svg') }}">
    <link rel="alternate icon" type="image/png" href="{{ root_url(request, '/dashboard/static/favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ root_url(request, '/dashboard/static/favicon.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ root_url(request, '/dashboard/static/style.css') }}?v=7">
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body class="base-simple-body">
    <header>
        <nav>
            <a href="{{ root_url(request, '/dashboard/') }}">HA-AgentHub</a>
        </nav>
    </header>
    <main class="base-simple-main">
        {% block content %}{% endblock %}
    </main>
    <footer class="app-footer app-footer--simple" role="contentinfo">
        <span class="app-footer-text">HA-AgentHub <span class="app-footer-version">{{ app_version }}</span></span>
    </footer>
</body>
</html>
