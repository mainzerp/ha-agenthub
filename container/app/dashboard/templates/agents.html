{% extends "dashboard_base.html" %}
{% block page_title %}Agents{% endblock %}
{% block page_css %}<link rel="stylesheet" href="{{ static_url(request, '/dashboard/static/css/pages/agents.css') }}">{% endblock %}
{% block header_title %}Agent Configuration{% endblock %}
{% block page_content %}
<div x-data="agentsPage()" x-init="loadAgents()">
    <div x-show="error" class="alert alert-error mb-md cursor-pointer" x-text="error" @click="error = null"></div>
    <div class="page-header">
        <div class="page-header-text">
            <p class="page-subtitle">Enable or disable agents, edit model settings, and modify system prompts.</p>
        </div>
        <div class="page-actions">
            <span class="text-muted" x-text="agents.length + ' agents'"></span>
        </div>
    </div>

    <div id="agents-list">
        <template x-if="loading">
            <p class="text-muted">Loading agents...</p>
        </template>
        <template x-if="!loading && agents.length === 0">
            <div class="empty-state">
                <p>No agents configured.</p>
            </div>
        </template>
        <template x-for="agent in agents" :key="agent.agent_id">
            <div class="card" :class="agent.agent_id === 'orchestrator' ? 'card-orchestrator' : ''">
                <div class="flex-between flex-wrap">
                    <div class="flex-center">
                        <span class="badge badge-dot" :class="agent.enabled == 1 ? 'badge-green' : 'badge-muted'" x-text="agent.enabled == 1 ? 'Enabled' : 'Disabled'"></span>
                        <strong x-text="agent.agent_id" class="mono"></strong>
                        <span x-show="agent.description" class="text-muted text-sm" x-text="agent.description"></span>
                    </div>
                    <div class="btn-group">
                        <label class="toggle">
                            <input type="checkbox" :checked="agent.enabled == 1" @change="toggleAgent(agent)">
                            <span class="toggle-slider"></span>
                        </label>
                        <button class="btn btn-sm btn-secondary" @click="agent._editing = !agent._editing; if(agent._editing) { loadAgentMcpTools(agent.agent_id); }">Edit</button>
                        <button class="btn btn-sm btn-secondary" @click="agent._editingPrompt = !agent._editingPrompt; if(agent._editingPrompt) loadPrompt(agent)">Prompt</button>
                    </div>
                </div>

                <div x-show="agent._actionError" class="alert alert-error mt-sm" x-text="agent._actionError"></div>

                <!-- Entity visibility badges -->
                <div class="form-row gap-sm mt-sm flex-wrap gap-xs">
                    <template x-if="visibilitySummary[agent.agent_id] && visibilitySummary[agent.agent_id].has_rules && visibilitySummary[agent.agent_id].domains.length > 0">
                        <template x-for="domain in visibilitySummary[agent.agent_id].domains.filter(d => !(visibilitySummary[agent.agent_id].device_classes || []).length || !['sensor','binary_sensor'].includes(d))" :key="domain">
                                     <a :href="window.dashUrl('/dashboard/entity-index') + '?agent=' + encodeURIComponent(agent.agent_id)"
                               class="badge badge-teal cursor-pointer no-underline text-xs"
                               x-text="domain"></a>
                        </template>
                    </template>
                    <template x-if="visibilitySummary[agent.agent_id] && (visibilitySummary[agent.agent_id].device_classes || []).length > 0">
                        <template x-for="dc in visibilitySummary[agent.agent_id].device_classes" :key="dc">
                                     <a :href="window.dashUrl('/dashboard/entity-index') + '?agent=' + encodeURIComponent(agent.agent_id)"
                               class="badge badge-indigo cursor-pointer no-underline text-xs"
                               x-text="'sensor:' + dc"></a>
                        </template>
                    </template>
                    <template x-if="visibilitySummary[agent.agent_id] && visibilitySummary[agent.agent_id].has_rules && visibilitySummary[agent.agent_id].domains.length === 0 && !(visibilitySummary[agent.agent_id].device_classes || []).length">
                                <a :href="window.dashUrl('/dashboard/entity-index') + '?agent=' + encodeURIComponent(agent.agent_id)"
                           class="badge badge-teal cursor-pointer no-underline text-xs">Entity rules</a>
                    </template>
                    <template x-if="(!visibilitySummary[agent.agent_id] || !visibilitySummary[agent.agent_id].has_rules) && nonEntityAgents.indexOf(agent.agent_id) !== -1">
                        <span class="badge badge-muted text-xs opacity-60">No entity access</span>
                    </template>
                    <template x-if="(!visibilitySummary[agent.agent_id] || !visibilitySummary[agent.agent_id].has_rules) && nonEntityAgents.indexOf(agent.agent_id) === -1">
                                <a :href="window.dashUrl('/dashboard/entity-index') + '?agent=' + encodeURIComponent(agent.agent_id)"
                           class="badge badge-muted cursor-pointer no-underline text-xs">All entities</a>
                    </template>
                    <!-- MCP tool badges -->
                    <template x-if="allMcpAssignments[agent.agent_id] && allMcpAssignments[agent.agent_id].length > 0">
                        <template x-for="serverGroup in Object.entries(
                            (allMcpAssignments[agent.agent_id] || []).reduce((acc, t) => {
                                acc[t.server_name] = (acc[t.server_name] || 0) + 1;
                                return acc;
                            }, {})
                        )" :key="serverGroup[0]">
                            <span class="badge badge-purple text-xs"
                                  x-text="'MCP: ' + serverGroup[0] + ' (' + serverGroup[1] + ')'"></span>
                        </template>
                    </template>
                </div>

                <!-- Inline config editor -->
                <template x-if="agent._editing">
                    <div class="edit-panel">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Provider</label>
                                <select class="form-input" x-model="agent._provider" @change="updateModelString(agent, true)"
                                        x-init="$nextTick(() => { $el.value = agent._provider })">
                                    <option value="">-- select --</option>
                                    <template x-for="p in allProviders" :key="p">
                                        <option :value="p" :selected="agent._provider === p"
                                                x-text="configuredProviders.indexOf(p) !== -1 ? p : p + ' (no key)'"></option>
                                    </template>
                                    <template x-if="agent._provider && allProviders.indexOf(agent._provider) === -1">
                                        <option :value="agent._provider" x-text="agent._provider" selected></option>
                                    </template>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Model</label>
                                <input type="text" class="form-input" x-model="agent._modelName"
                                       @input="updateModelString(agent, false)"
                                       :placeholder="getModelPlaceholder(agent._provider)"
                                       list="model-suggestions">
                                <datalist id="model-suggestions">
                                    <template x-for="m in getModelSuggestions(agent._provider)" :key="m">
                                        <option :value="m"></option>
                                    </template>
                                </datalist>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Timeout (s)</label>
                                <input type="number" class="form-input" x-model.number="agent.timeout" min="1" max="120">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Temperature</label>
                                <input type="range" min="0" max="2" step="0.1" x-model.number="agent.temperature">
                                <span class="mono text-xs" x-text="agent.temperature"></span>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Max Tokens</label>
                                <input type="number" class="form-input" x-model.number="agent.max_tokens" min="1">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Max Iterations</label>
                                <input type="number" class="form-input" x-model.number="agent.max_iterations" min="1" max="20">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Reasoning Effort</label>
                                <select class="form-input" x-model="agent.reasoning_effort">
                                    <option value="">Default</option>
                                    <option value="low">Low</option>
                                    <option value="medium">Medium</option>
                                    <option value="high">High</option>
                                </select>
                            </div>
                            <div class="form-group form-grid-full">
                                <label class="form-label">Description</label>
                                <input type="text" class="form-input" x-model="agent.description" placeholder="Agent description">
                            </div>
                        </div>
                        <!-- MCP Tools Assignment -->
                        <div class="mt-md">
                            <label class="form-label">MCP Servers</label>
                            <template x-if="mcpServers.filter(s => s.connected).length === 0">
                                <p class="text-muted text-sm">No connected MCP servers available.</p>
                            </template>
                            <div class="flex-wrap">
                                <template x-for="server in mcpServers.filter(s => s.connected)" :key="server.name">
                                    <label class="badge cursor-pointer text-xs"
                                           :class="isServerAssigned(agent.agent_id, server.name) ? 'badge-purple' : 'badge-muted'">
                                        <input type="checkbox" class="sr-only"
                                               :checked="isServerAssigned(agent.agent_id, server.name)"
                                               @change="toggleServerAssignment(agent.agent_id, server.name)">
                                        <span x-text="server.name"></span>
                                    </label>
                                </template>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-primary btn-sm" @click="saveAgent(agent)">Save</button>
                            <span x-show="agent._saved" class="save-feedback text-sage">Saved</span>
                            <span x-show="agent._saveError" class="save-feedback text-danger" x-text="agent._saveError"></span>
                        </div>
                    </div>
                </template>

                <!-- Inline prompt editor -->
                <template x-if="agent._editingPrompt">
                    <div class="edit-panel">
                        <div class="form-group">
                            <label class="form-label">System Prompt</label>
                            <textarea class="form-textarea" rows="10" x-model="agent._promptContent" :placeholder="agent._promptLoading ? 'Loading...' : 'No prompt file found'"></textarea>
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-primary btn-sm" @click="savePrompt(agent)">Save Prompt</button>
                            <span x-show="agent._promptSaved" class="save-feedback text-sage">Saved</span>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </div>
</div>

<script>
function agentsPage() {
    return {
        agents: [],
        loading: true,
        error: null,
        allProviders: [],
        configuredProviders: [],
        visibilitySummary: {},
        nonEntityAgents: ['orchestrator', 'rewrite-agent', 'general-agent', 'filler-agent', 'send-agent'],
        mcpServers: [],
        mcpServerTools: {},
        agentMcpTools: {},
        allMcpAssignments: {},
        mcpToolsLoading: false,
        async loadAgents() {
            try {
                await this.loadConfiguredProviders();
                var data = await window.dashboardApi.json('/api/admin/agents');
                var allAgents = (data.agents || []).map((a) => this.prepareAgent(a));
                var orch = allAgents.filter((a) => a.agent_id === 'orchestrator');
                var rest = allAgents.filter((a) => a.agent_id !== 'orchestrator');
                rest.sort((a, b) => (a.name || a.agent_id).localeCompare(b.name || b.agent_id));
                this.agents = orch.concat(rest);
                await this.loadVisibilitySummary();
                await this.loadMcpServers();
                await this.loadAllMcpAssignments();
            } catch(e) {
                console.error("Failed to load agents", e);
            }
            this.loading = false;
        },
        async loadConfiguredProviders() {
            try {
                var data = await window.dashboardApi.json('/api/admin/llm-providers/configured');
                this.allProviders = data.providers || [];
                this.configuredProviders = data.configured || [];
            } catch (e) {
                if (e.code === 'auth_expired') {
                    return;
                }
                console.error('Failed to load configured providers', e);
            }
        },
        async loadVisibilitySummary() {
            try {
                var data = await window.dashboardApi.json('/api/admin/agents/visibility-summary');
                this.visibilitySummary = data.summary || {};
            } catch (e) {
                if (e.code === 'auth_expired') {
                    return;
                }
                console.error('Failed to load visibility summary', e);
            }
        },
        async loadMcpServers() {
            try {
                this.mcpServers = await window.dashboardApi.json('/api/admin/mcp-servers');
            } catch (e) {
                if (e.code === 'auth_expired') {
                    return;
                }
                console.error('Failed to load MCP servers', e);
            }
        },
        async loadMcpServerTools(serverName) {
            if (this.mcpServerTools[serverName]) return;
            try {
                var tools = await window.dashboardApi.json('/api/admin/mcp-servers/' + encodeURIComponent(serverName) + '/tools');
                this.mcpServerTools = {...this.mcpServerTools, [serverName]: tools};
            } catch (e) {
                if (e.code === 'auth_expired') {
                    return;
                }
                console.error('Failed to load tools for ' + serverName, e);
            }
        },
        async loadAgentMcpTools(agentId) {
            this.mcpToolsLoading = true;
            try {
                var tools = await window.dashboardApi.json('/api/admin/mcp-servers/agent-tools/' + encodeURIComponent(agentId));
                this.agentMcpTools = {...this.agentMcpTools, [agentId]: tools};
            } catch (e) {
                if (e.code === 'auth_expired') {
                    return;
                }
                console.error('Failed to load agent MCP tools', e);
            }
            this.mcpToolsLoading = false;
        },
        prepareAgent(agent) {
            agent._editing = false;
            agent._editingPrompt = false;
            agent._promptContent = '';
            agent._promptLoading = false;
            agent._promptSaved = false;
            agent._saved = false;
            agent._actionError = '';
            agent._feedbackTimer = null;
            this.applyAgentConfig(agent, agent);
            return agent;
        },
        applyAgentConfig(agent, data) {
            var configKeys = [
                'enabled',
                'model',
                'timeout',
                'temperature',
                'max_tokens',
                'max_iterations',
                'description',
                'reasoning_effort'
            ];
            for (var key of configKeys) {
                if (Object.prototype.hasOwnProperty.call(data, key)) {
                    agent[key] = data[key];
                }
            }
            agent._provider = '';
            agent._modelName = '';
            if (agent.model && agent.model.indexOf('/') !== -1) {
                agent._provider = agent.model.split('/')[0];
                agent._modelName = agent.model.substring(agent._provider.length + 1);
            } else if (agent.model) {
                agent._modelName = agent.model;
            }
        },
        findAgent(agentId) {
            return this.agents.find(function(agent) {
                return agent.agent_id === agentId;
            }) || null;
        },
        clearAgentFeedback(agent) {
            if (!agent) {
                return;
            }
            if (agent._feedbackTimer) {
                clearTimeout(agent._feedbackTimer);
                agent._feedbackTimer = null;
            }
            agent._saved = false;
            agent._promptSaved = false;
            agent._actionError = '';
        },
        showAgentSaved(agent, kind) {
            if (!agent) {
                return;
            }
            this.clearAgentFeedback(agent);
            if (kind === 'prompt') {
                agent._promptSaved = true;
            } else {
                agent._saved = true;
            }
            agent._feedbackTimer = setTimeout(function() {
                agent._saved = false;
                agent._promptSaved = false;
                agent._feedbackTimer = null;
            }, 2000);
        },
        showAgentError(agent, message) {
            if (!agent) {
                return;
            }
            this.clearAgentFeedback(agent);
            agent._actionError = message || 'Request failed';
            agent._feedbackTimer = setTimeout(function() {
                agent._actionError = '';
                agent._feedbackTimer = null;
            }, 5000);
        },
        async reloadAgent(agentId) {
            var agent = this.findAgent(agentId);
            if (!agent) {
                return;
            }
            var data = await window.dashboardApi.json('/api/admin/agents/' + encodeURIComponent(agentId));
            this.applyAgentConfig(agent, data);
        },
        isServerAssigned(agentId, serverName) {
            var assigned = this.agentMcpTools[agentId] || [];
            return assigned.some(t => t.server_name === serverName);
        },
        async toggleServerAssignment(agentId, serverName) {
            var agent = this.findAgent(agentId);
            this.clearAgentFeedback(agent);
            var wasAssigned = this.isServerAssigned(agentId, serverName);
            try {
                if (wasAssigned) {
                    var assigned = (this.agentMcpTools[agentId] || []).filter(t => t.server_name === serverName);
                    for (var t of assigned) {
                        await window.dashboardApi.request('/api/admin/mcp-servers/agent-tools/' + encodeURIComponent(agentId) + '/' + encodeURIComponent(t.server_name) + '/' + encodeURIComponent(t.tool_name), {
                            method: 'DELETE'
                        });
                    }
                } else {
                    await this.loadMcpServerTools(serverName);
                    var tools = this.mcpServerTools[serverName] || [];
                    for (var tool of tools) {
                        await window.dashboardApi.request('/api/admin/mcp-servers/agent-tools/' + encodeURIComponent(agentId), {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ server_name: serverName, tool_name: tool.name })
                        });
                    }
                }
                await this.loadAgentMcpTools(agentId);
                await this.loadAllMcpAssignments();
                this.showAgentSaved(agent, 'config');
            } catch (e) {
                if (e.code === 'auth_expired') {
                    return;
                }
                try {
                    await this.loadAgentMcpTools(agentId);
                    await this.loadAllMcpAssignments();
                } catch (_) {
                    // Preserve the original write error.
                }
                this.showAgentError(agent, e.detail || 'Failed to update MCP tool assignments');
            }
        },
        async loadAllMcpAssignments() {
            try {
                this.allMcpAssignments = await window.dashboardApi.json('/api/admin/mcp-servers/agent-tools-summary');
            } catch (e) {
                if (e.code === 'auth_expired') {
                    return;
                }
                console.error('Failed to load MCP assignments summary', e);
            }
        },
        updateModelString(agent, providerChanged) {
            if (providerChanged) {
                agent._modelName = '';
            }
            if (agent._provider && agent._modelName) {
                agent.model = agent._provider + '/' + agent._modelName;
            } else if (agent._modelName) {
                agent.model = agent._modelName;
            } else {
                agent.model = '';
            }
        },
        getModelSuggestions(provider) {
            var suggestions = {
                'openrouter': ['openai/gpt-4o-mini', 'openai/gpt-4o', 'anthropic/claude-3.5-sonnet', 'google/gemini-2.0-flash-001', 'meta-llama/llama-3.1-8b-instruct'],
                'groq': ['llama-3.1-8b-instant', 'llama-3.1-70b-versatile', 'mixtral-8x7b-32768', 'gemma2-9b-it'],
                'anthropic': ['claude-3-haiku-20240307', 'claude-3-5-sonnet-20241022', 'claude-3-opus-20240229'],
                'ollama': ['llama3', 'mistral', 'codellama', 'gemma2'],
                'custom_openai': ['gpt-4o-mini', 'gpt-4o', 'deepseek-chat', 'kimi-latest']
            };
            return suggestions[provider] || [];
        },
        getModelPlaceholder(provider) {
            var placeholders = {
                'openrouter': 'openai/gpt-4o-mini',
                'groq': 'llama-3.1-8b-instant',
                'anthropic': 'claude-3-haiku-20240307',
                'ollama': 'llama3',
                'custom_openai': 'gpt-4o-mini'
            };
            return placeholders[provider] || 'model-name';
        },
        async toggleAgent(agent) {
            var newEnabled = agent.enabled == 1 ? false : true;
            this.clearAgentFeedback(agent);
            try {
                await window.dashboardApi.request('/api/admin/agents/' + encodeURIComponent(agent.agent_id), {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ enabled: newEnabled })
                });
                await this.reloadAgent(agent.agent_id);
            } catch(e) {
                if (e.code === 'auth_expired') {
                    return;
                }
                try {
                    await this.reloadAgent(agent.agent_id);
                } catch (_) {
                    // Preserve the original write error.
                }
                this.showAgentError(agent, e.detail || 'Failed to update agent');
            }
        },
        async saveAgent(agent) {
            this.clearAgentFeedback(agent);
            try {
                await window.dashboardApi.request('/api/admin/agents/' + encodeURIComponent(agent.agent_id), {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: agent.model || null,
                        timeout: agent.timeout,
                        temperature: agent.temperature,
                        max_tokens: agent.max_tokens,
                        max_iterations: agent.max_iterations,
                        description: agent.description || null,
                        reasoning_effort: agent.reasoning_effort || ""
                    })
                });
                await this.reloadAgent(agent.agent_id);
                this.showAgentSaved(agent, 'config');
            } catch(e) {
                if (e.code === 'auth_expired') {
                    return;
                }
                try {
                    await this.reloadAgent(agent.agent_id);
                } catch (_) {
                    // Preserve the original write error.
                }
                console.error("Failed to save agent config", e);
                this.showAgentError(agent, e.detail || 'Failed to save agent configuration');
            }
        },
        async loadPrompt(agent) {
            agent._promptLoading = true;
            try {
                var data = await window.dashboardApi.json('/api/admin/agents/' + agent.agent_id + '/prompt');
                agent._promptContent = data.content || '';
            } catch(e) {
                if (e.code === 'auth_expired') {
                    return;
                }
                agent._promptContent = "";
            }
            agent._promptLoading = false;
        },
        async savePrompt(agent) {
            this.clearAgentFeedback(agent);
            try {
                await window.dashboardApi.request('/api/admin/agents/' + encodeURIComponent(agent.agent_id) + '/prompt', {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: agent._promptContent })
                });
                this.showAgentSaved(agent, 'prompt');
            } catch(e) {
                if (e.code === 'auth_expired') {
                    return;
                }
                console.error("Failed to save prompt", e);
                this.showAgentError(agent, e.detail || 'Failed to save prompt');
            }
        }
    };
}
</script>
{% endblock %}
