<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}HA-AgentHub{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ root_url(request, '/dashboard/static/favicon.svg') }}">
    <link rel="alternate icon" type="image/png" href="{{ root_url(request, '/dashboard/static/favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ root_url(request, '/dashboard/static/favicon.png') }}">
    <link rel="stylesheet" href="{{ static_url(request, '/dashboard/static/css/fonts.css') }}">
    <link rel="stylesheet" href="{{ static_url(request, '/dashboard/static/css/tokens.css') }}">
    <link rel="stylesheet" href="{{ static_url(request, '/dashboard/static/css/base.css') }}">
    <link rel="stylesheet" href="{{ static_url(request, '/dashboard/static/css/layout.css') }}">
    <link rel="stylesheet" href="{{ static_url(request, '/dashboard/static/css/components.css') }}">
    <link rel="stylesheet" href="{{ static_url(request, '/dashboard/static/css/auth.css') }}">
    <script src="{{ static_url(request, '/dashboard/static/vendor/htmx/htmx-2.0.4.min.js') }}" defer></script>
</head>
<body class="base-simple-body">
    <a href="#main" class="skip-link">Skip to content</a>
    <main id="main" class="base-simple-main" tabindex="-1">
        {% block content %}{% endblock %}
    </main>
    <footer class="app-footer app-footer--simple" role="contentinfo">
        <span class="app-footer-text">HA-AgentHub <span class="app-footer-version">{{ app_version }}</span></span>
    </footer>
</body>
</html>
