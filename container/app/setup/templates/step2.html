{% extends "base_setup.html" %}
{% block content %}
<h2>Home Assistant Connection</h2>
<p class="text-muted mb-md">Enter your HA instance URL and Long-Lived Access Token.</p>
<form method="post" action="/setup/step/2" id="ha-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-group">
        <label class="form-label" for="ha_url">HA URL</label>
        <input type="url" id="ha_url" name="ha_url" placeholder="http://homeassistant.local:8123" required class="form-input">
    </div>
    <div class="form-group">
        <label class="form-label" for="ha_token">Long-Lived Access Token</label>
        <input type="password" id="ha_token" name="ha_token" required class="form-input">
    </div>
    <div class="btn-group">
        <button type="button" class="btn btn-secondary"
            hx-post="/setup/test/ha"
            hx-include="#ha-form"
            hx-target="#test-result"
            hx-swap="innerHTML">Test Connection</button>
    </div>
    <div id="test-result" class="mt-md"></div>
    <div class="mt-md">
        <button type="submit" class="btn btn-primary">Next</button>
    </div>
</form>
{% endblock %}
