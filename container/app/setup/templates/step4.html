{% extends "base_setup.html" %}
{% block content %}
<h2>LLM Provider Configuration</h2>
<p class="text-muted mb-md">Configure at least one LLM provider. You can add more later in the dashboard.</p>
<form method="post" action="/setup/step/4" id="llm-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-group">
        <label class="form-label" for="openrouter_key">OpenRouter API Key (optional)</label>
        <input type="password" id="openrouter_key" name="openrouter_key" class="form-input">
    </div>
    <div class="form-group">
        <label class="form-label" for="groq_key">Groq API Key (optional)</label>
        <input type="password" id="groq_key" name="groq_key" class="form-input">
    </div>
    <div class="form-group">
        <label class="form-label" for="ollama_url">Ollama URL (optional)</label>
        <input type="url" id="ollama_url" name="ollama_url" placeholder="http://localhost:11434" class="form-input">
    </div>
    <div class="btn-group mb-md">
        <button type="button" class="btn btn-secondary"
            hx-post="/setup/test/llm"
            hx-vals='js:{"provider": "openrouter", "api_key": document.getElementById("openrouter_key").value, "csrf_token": document.querySelector("#llm-form input[name=csrf_token]").value}'
            hx-target="#test-llm-result"
            hx-swap="innerHTML">Test OpenRouter</button>
        <button type="button" class="btn btn-secondary"
            hx-post="/setup/test/llm"
            hx-vals='js:{"provider": "groq", "api_key": document.getElementById("groq_key").value, "csrf_token": document.querySelector("#llm-form input[name=csrf_token]").value}'
            hx-target="#test-llm-result"
            hx-swap="innerHTML">Test Groq</button>
    </div>
    <div id="test-llm-result"></div>
    <div class="mt-md">
        <button type="submit" class="btn btn-primary">Next</button>
    </div>
</form>
{% endblock %}
