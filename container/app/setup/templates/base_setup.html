<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA-AgentHub Setup</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"
        integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
        crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard/static/style.css?v=8">
</head>
<body class="setup-shell">
    <div class="setup-container">
        <h1 class="page-title">HA-AgentHub Setup</h1>
        {% block progress %}
        <div class="setup-progress">
            {% for i in range(1, total_steps + 1) %}
            <div class="setup-progress-step {% if i < step_num %}setup-progress-step--completed{% elif i == step_num %}setup-progress-step--current{% else %}setup-progress-step--pending{% endif %}">
                {{ i }}
            </div>
            {% endfor %}
        </div>
        {% endblock %}
        <div class="card setup-card">
            {% block content %}{% endblock %}
        </div>
    </div>
    <footer class="setup-footer" role="contentinfo">
        HA-AgentHub <span class="setup-footer-version">{{ app_version }}</span>
    </footer>
</body>
</html>
