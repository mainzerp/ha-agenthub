{% extends "base_setup.html" %}
{% block content %}
<h2>Container API Key</h2>
{% if generated %}
<p class="text-muted mb-md">Save this API key now. It will not be shown again.</p>
<div class="api-key-tile">{{ api_key }}</div>
<form method="get" action="/setup/step/4">
    <button type="submit" class="btn btn-primary">Next</button>
</form>
{% else %}
<p class="text-muted mb-md">Generate an API key for authenticating requests to this container.</p>
<form method="post" action="/setup/step/3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button type="submit" class="btn btn-primary">Generate API Key</button>
</form>
{% endif %}
{% endblock %}
